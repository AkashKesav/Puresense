name: puresense
version: 1.0.0+1
publish_to: none
description: Precision metal analysis app

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial:
    path: third_party/flutter_bluetooth_serial
  permission_handler: ^11.3.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  audioplayers: ^5.2.1
  fl_chart: ^0.68.0
  http: ^1.2.1
  csv: ^6.0.0
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_foundation: 2.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/chime_24k.mp3
    - assets/sounds/chime_gold.mp3
    - assets/sounds/beep_notgold.mp3
    - assets/sounds/beep_probe_air.mp3
    - assets/sounds/click_step.mp3
    - assets/sounds/success_density.mp3
    - assets/sounds/error_beep.mp3
    - assets/images/logo.png
    # - assets/images/density_zero.png    # Add your own images here
    # - assets/images/density_sample.png  # Add your own images here
    # - assets/images/density_water_baseline.png  # Add your own images here
    # - assets/images/density_submerged.png  # Add your own images here
    # - assets/images/density_calculate.png  # Add your own images here

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
